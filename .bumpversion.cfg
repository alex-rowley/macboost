[bumpversion]
current_version = 0.4.0
commit = True
tag = True
message = chore: Release {new_version}

[bumpversion:file:python/pyproject.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:python/macboost/__init__.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"

[bumpversion:file:Sources/MacBoost/Version.swift]
search = macBoostVersion = "{current_version}"
replace = macBoostVersion = "{new_version}"
